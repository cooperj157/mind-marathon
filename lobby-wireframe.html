<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Marathon — Lobby Wireframe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #2C1810;
      display: flex;
      gap: 48px;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 32px;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
    }

    /* ── Phone shell ── */
    .phone {
      width: 375px;
      background: #1a0e08;
      border-radius: 44px;
      padding: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7), inset 0 0 0 2px #4a3020;
      flex-shrink: 0;
    }

    .screen {
      background: #F4E4BC;
      border-radius: 32px;
      overflow: hidden;
      min-height: 680px;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav bar ── */
    .navbar {
      background: #2C1810;
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .navbar-title {
      color: #F5DEB3;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    .navbar-sub {
      color: #9C7A50;
      font-size: 12px;
      letter-spacing: 0.3px;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #C8930A;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2C1810;
      font-size: 13px;
      font-weight: bold;
    }

    /* ── Body ── */
    .body {
      flex: 1;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Primary button ── */
    .btn-primary {
      width: 100%;
      background: #2C1810;
      border: none;
      border-radius: 14px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 4px 0 #1a0e08;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-primary:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #1a0e08;
    }
    .btn-primary .icon {
      width: 28px;
      height: 28px;
      background: #C8930A;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary .icon svg { display: block; }
    .btn-primary .label {
      color: #F5DEB3;
      font-size: 17px;
      font-weight: bold;
      letter-spacing: 0.3px;
    }

    /* ── Section heading ── */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #5C3317;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #C8930A44;
    }

    /* ── Game card ── */
    .game-card {
      background: #fff8e8;
      border: 1.5px solid #C8930A55;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 6px rgba(44,24,16,0.08);
    }
    .opponent-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #2C1810;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #F5DEB3;
      font-size: 15px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .game-info {
      flex: 1;
      min-width: 0;
    }
    .game-opponent {
      font-size: 15px;
      font-weight: bold;
      color: #2C1810;
      margin-bottom: 3px;
    }
    .game-meta {
      font-size: 12px;
      color: #7a5c3a;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .game-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }
    .dot-your-turn  { background: #2a8a3e; }
    .dot-their-turn { background: #9C7A50; }
    .turn-label { font-size: 12px; font-weight: bold; }
    .your-turn-label  { color: #2a8a3e; }
    .their-turn-label { color: #9C7A50; }

    .btn-resume {
      background: #C8930A;
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.2px;
      flex-shrink: 0;
      font-family: Georgia, serif;
    }
    .btn-resume.disabled {
      background: #ddd;
      color: #aaa;
      cursor: default;
    }

    /* ── Progress pips ── */
    .checkpoints {
      display: flex;
      gap: 4px;
      margin-top: 5px;
    }
    .pip {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid #C8930A;
    }
    .pip.filled { background: #C8930A; }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 32px 0;
      opacity: 0.6;
    }
    .empty-icon {
      font-size: 40px;
      margin-bottom: 4px;
    }
    .empty-title {
      font-size: 15px;
      font-weight: bold;
      color: #5C3317;
    }
    .empty-sub {
      font-size: 13px;
      color: #7a5c3a;
      text-align: center;
      line-height: 1.5;
    }

    /* ── Labels ── */
    .wireframe-label {
      color: #9C7A50;
      font-family: Georgia, serif;
      font-size: 13px;
      text-align: center;
      margin-top: 16px;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════ -->
  <!-- STATE 1: No active games                  -->
  <!-- ══════════════════════════════════════════ -->
  <div>
    <div class="phone">
      <div class="screen">

        <div class="navbar">
          <div>
            <div class="navbar-title">Mind Marathon</div>
          </div>
          <div class="avatar">C</div>
        </div>

        <div class="body">

          <!-- Start game button -->
          <button class="btn-primary">
            <div class="icon">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <polygon points="3,1 13,7 3,13" fill="#2C1810"/>
              </svg>
            </div>
            <span class="label">Start Game</span>
          </button>

          <!-- Active games section — empty -->
          <div>
            <div class="section-heading">Active Games</div>
            <div class="empty-state">
              <div class="empty-icon">🎲</div>
              <div class="empty-title">No games yet</div>
              <div class="empty-sub">Start a random game above<br>to find an opponent</div>
            </div>
          </div>

        </div>
      </div>
    </div>
    <div class="wireframe-label">Empty state</div>
  </div>

  <!-- ══════════════════════════════════════════ -->
  <!-- STATE 2: Active games                     -->
  <!-- ══════════════════════════════════════════ -->
  <div>
    <div class="phone">
      <div class="screen">

        <div class="navbar">
          <div>
            <div class="navbar-title">Mind Marathon</div>
          </div>
          <div class="avatar">C</div>
        </div>

        <div class="body">

          <!-- Start game button -->
          <button class="btn-primary">
            <div class="icon">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <polygon points="3,1 13,7 3,13" fill="#2C1810"/>
              </svg>
            </div>
            <span class="label">Start Game</span>
          </button>

          <!-- Active games section -->
          <div style="display:flex; flex-direction:column; gap:10px;">
            <div class="section-heading">Active Games</div>

            <!-- Game 1: your turn -->
            <div class="game-card">
              <div class="opponent-avatar">JR</div>
              <div class="game-info">
                <div class="game-opponent">Jake R.</div>
                <div class="game-meta">
                  <div class="game-dot dot-your-turn"></div>
                  <span class="turn-label your-turn-label">Your turn</span>
                </div>
                <div class="checkpoints">
                  <div class="pip filled"></div>
                  <div class="pip filled"></div>
                  <div class="pip filled"></div>
                  <div class="pip"></div>
                  <div class="pip"></div>
                  <div class="pip"></div>
                </div>
              </div>
              <button class="btn-resume">Resume</button>
            </div>

            <!-- Game 2: their turn -->
            <div class="game-card">
              <div class="opponent-avatar">SM</div>
              <div class="game-info">
                <div class="game-opponent">Sara M.</div>
                <div class="game-meta">
                  <div class="game-dot dot-their-turn"></div>
                  <span class="turn-label their-turn-label">Their turn</span>
                </div>
                <div class="checkpoints">
                  <div class="pip filled"></div>
                  <div class="pip"></div>
                  <div class="pip"></div>
                  <div class="pip"></div>
                  <div class="pip"></div>
                  <div class="pip"></div>
                </div>
              </div>
              <button class="btn-resume disabled">Resume</button>
            </div>

            <!-- Game 3: your turn -->
            <div class="game-card">
              <div class="opponent-avatar">TK</div>
              <div class="game-info">
                <div class="game-opponent">Tyler K.</div>
                <div class="game-meta">
                  <div class="game-dot dot-your-turn"></div>
                  <span class="turn-label your-turn-label">Your turn</span>
                </div>
                <div class="checkpoints">
                  <div class="pip filled"></div>
                  <div class="pip filled"></div>
                  <div class="pip"></div>
                  <div class="pip"></div>
                  <div class="pip"></div>
                  <div class="pip"></div>
                </div>
              </div>
              <button class="btn-resume">Resume</button>
            </div>

          </div>
        </div>
      </div>
    </div>
    <div class="wireframe-label">With active games</div>
  </div>

</body>
</html>
